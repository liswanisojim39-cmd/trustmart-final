<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Restricted</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .gate-msg { text-align: center; padding: 20px; }
        #adminContent { display: none; width: 100%; max-width: 600px; padding: 20px; }
    </style>
</head>
<body>

    <div id="gatekeeper" class="gate-msg">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Verifying Identity...</p>
    </div>

    <div id="adminContent">
        <h1>Welcome Back, Owner</h1>
        <p>Your Admin Panel is ready.</p>
        <a href="profile.html" style="color: #38bdf8; text-decoration: none;">Exit Dashboard</a>
    </div>

    <script>
        // USE THE SAME CONFIG AS PROFILE.HTML
        const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
        firebase.initializeApp(firebaseConfig);

        const OWNER_EMAIL = "liswanisojim39@gmail.com";

        firebase.auth().onAuthStateChanged((user) => {
            if (user && user.email === OWNER_EMAIL) {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
            } else {
                alert("Unauthorized! Returning to home.");
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
