<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeta Admin - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #1a1a2e; --accent: #16213e; --text: #e94560; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f3460; margin: 0; color: white; padding-bottom: 20px; }
        
        /* Admin Sidebar/Header */
        .admin-header { background: var(--dark); padding: 25px; border-bottom: 3px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }
        .admin-title { font-size: 20px; font-weight: 900; letter-spacing: 2px; }
        .status-dot { height: 10px; width: 10px; background-color: var(--primary); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--primary); }

        .container { padding: 20px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--accent); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-card i { color: var(--primary); font-size: 24px; margin-bottom: 10px; }
        .stat-card b { display: block; font-size: 22px; }
        .stat-card span { font-size: 12px; color: #888; }

        /* Recent Activity Table */
        .activity-card { background: var(--dark); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .activity-card h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #333; }
        .list-item:last-child { border-bottom: none; }
        .item-info b { display: block; font-size: 14px; }
        .item-info span { font-size: 11px; color: #aaa; }
        
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .badge-pending { background: #f1c40f; color: black; }
        .badge-live { background: var(--primary); color: white; }

        /* Quick Actions */
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        .admin-btn { flex: 1; background: var(--primary); color: white; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 13px; }
        .admin-btn.danger { background: #e94560; }
    </style>
</head>
<body>

    <div class="admin-header">
        <div class="admin-title">ZETA <span style="color: var(--primary);">CONTROL</span></div>
        <div style="font-size: 12px;"><span class="status-dot"></span> System Live</div>
    </div>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <b>1,240</b>
                <span>Total Users</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-shopping-cart"></i>
                <b>342</b>
                <span>Active Ads</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-eye"></i>
                <b>15.8k</b>
                <span>Page Views</span>
            </div>
            <div class="stat-card">
                <i class="fas fa-wallet"></i>
                <b>K 4,500</b>
                <span>Revenue</span>
            </div>
        </div>

        <div class="activity-card">
            <h3>Recent Listings</h3>
            
            <div class="list-item">
                <div class="item-info">
                    <b>iPhone 14 Pro</b>
                    <span>Seller: Bwalya M.</span>
                </div>
                <div class="badge badge-live">LIVE</div>
            </div>

            <div class="list-item">
                <div class="item-info">
                    <b>Toyota Corolla</b>
                    <span>Seller: Kondwani T.</span>
                </div>
                <div class="badge badge-pending">PENDING</div>
            </div>

            <div class="list-item">
                <div class="item-info">
                    <b>3BR House - Chilenje</b>
                    <span>Seller: Sarah K.</span>
                </div>
                <div class="badge badge-live">LIVE</div>
            </div>
        </div>

        <div class="btn-group">
            <a href="index.html" class="admin-btn">View Site</a>
            <a href="login.html" class="admin-btn danger">Lock Panel</a>
        </div>
    </div>

</body>
</html>
