<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Trust Mart by Zeta</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .ad-card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid orange; }
        button { padding: 8px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin-right: 10px; }
        .app-btn { background: #22c55e; color: white; }
        .del-btn { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <h2>Moderation Queue</h2>
    <div id="list">Loading...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1GK3idp1dzm9ErX0k50dfFnCLjPVapLA",
            authDomain: "trust-mart-73f8a.firebaseapp.com",
            projectId: "trust-mart-73f8a",
            storageBucket: "trust-mart-73f8a.firebasestorage.app",
            messagingSenderId: "715567477271",
            appId: "1:715567477271:web:0550e70b07f7db8e80a252"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("ads").where("status", "==", "pending").onSnapshot(snap => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const ad = doc.data();
                list.innerHTML += `
                    <div class="ad-card">
                        <strong>${ad.title} (K${ad.price})</strong><br>
                        <small>${ad.sellerEmail}</small><br><br>
                        <button class="app-btn" onclick="approve('${doc.id}')">Approve</button>
                        <button class="del-btn" onclick="deleteAd('${doc.id}')">Delete</button>
                    </div>`;
            });
        });

        async function approve(id) { await db.collection("ads").doc(id).update({status: "approved"}); }
        async function deleteAd(id) { if(confirm("Delete?")) await db.collection("ads").doc(id).delete(); }
    </script>
</body>
</html>
