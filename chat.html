<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Kondwani - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; --me: #27ae60; --them: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header */
        .header { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .back-btn { color: var(--zeta); text-decoration: none; font-size: 20px; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; background: #3498db; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .user-info { flex: 1; }
        .user-info b { font-size: 15px; display: block; }
        .user-info span { font-size: 11px; color: var(--primary); font-weight: bold; }

        /* Item Context Bar */
        .item-bar { background: #fafafa; padding: 8px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .item-bar img { width: 35px; height: 35px; border-radius: 5px; object-fit: cover; }
        .item-bar div { font-size: 12px; }

        /* Chat Body */
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://www.transparenttextures.com/patterns/cubes.png'); }
        
        .bubble { max-width: 75%; padding: 12px 15px; border-radius: 18px; font-size: 14px; line-height: 1.4; position: relative; }
        .them { align-self: flex-start; background: var(--them); color: black; border-bottom-left-radius: 4px; }
        .me { align-self: flex-end; background: var(--me); color: white; border-bottom-right-radius: 4px; }
        
        .time { font-size: 9px; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }

        /* Input Bar */
        .input-bar { padding: 10px 15px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 12px; background: white; padding-bottom: env(safe-area-inset-bottom, 20px); }
        .input-wrap { flex: 1; background: #f0f2f5; border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; }
        .input-wrap input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; }
        .send-icon { color: var(--primary); font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <a href="messages.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="user-pic">KT</div>
        <div class="user-info">
            <b>Kondwani Tembo</b>
            <span>Active now</span>
        </div>
        <i class="fas fa-phone-alt" style="color: var(--primary);"></i>
    </div>

    <div class="item-bar">
        <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=100">
        <div>
            <b>Toyota Corolla 2016</b><br>
            <span style="color: var(--primary); font-weight: bold;">K 145,000</span>
        </div>
        <button style="margin-left: auto; border: 1px solid #ddd; background: white; border-radius: 5px; font-size: 11px; padding: 5px 10px;">View Ad</button>
    </div>

    <div class="chat-body" id="chatBody">
        <div class="bubble them">
            Is the car still available for viewing in Kitwe?
            <span class="time">10:45 AM</span>
        </div>

        <div class="bubble me">
            Yes, it is! I am available this afternoon at Kitwe Central.
            <span class="time">10:47 AM</span>
        </div>

        <div class="bubble them">
            Great. Can I bring my mechanic to check the engine?
            <span class="time">10:50 AM</span>
        </div>
    </div>

    <div class="input-bar">
        <i class="fas fa-image" style="color: #888;"></i>
        <div class="input-wrap">
            <input type="text" id="msgInput" placeholder="Aa">
        </div>
        <div class="send-icon" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const chatBody = document.getElementById('chatBody');
            
            if(input.value.trim() !== "") {
                const newMsg = document.createElement('div');
                newMsg.className = 'bubble me';
                newMsg.innerHTML = `${input.value} <span class="time">Just now</span>`;
                chatBody.appendChild(newMsg);
                input.value = "";
                chatBody.scrollTop = chatBody.scrollHeight;
            }
        }
    </script>

</body>
</html>
