<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; --bg: #f0f2f5; --bubble-me: #27ae60; --bubble-them: #e4e6eb; }
        body { font-family: 'Segoe UI', sans-serif; background: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Chat Header */
        .header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; background: white; position: sticky; top: 0; z-index: 10; }
        .back-btn { color: var(--zeta); text-decoration: none; font-size: 20px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: #3498db; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .user-status { flex: 1; }
        .user-status b { display: block; font-size: 15px; }
        .user-status span { font-size: 11px; color: var(--primary); font-weight: bold; }

        /* Message Area */
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; background: #fff; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; position: relative; }
        .msg-them { align-self: flex-start; background: var(--bubble-them); color: black; border-bottom-left-radius: 5px; }
        .msg-me { align-self: flex-end; background: var(--bubble-me); color: white; border-bottom-right-radius: 5px; }
        
        .time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        /* Input Bar */
        .input-area { padding: 10px 15px; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px; background: white; padding-bottom: 25px; }
        .input-box { flex: 1; background: #f0f2f5; border-radius: 25px; padding: 10px 15px; display: flex; align-items: center; }
        .input-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; }
        .send-btn { color: var(--primary); font-size: 20px; border: none; background: none; cursor: pointer; }

        /* Floating Product Preview */
        .product-brief { background: #f9f9f9; padding: 10px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .product-brief img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        <a href="messages.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="user-avatar">KT</div>
        <div class="user-status">
            <b>Kondwani Tembo</b>
            <span>Online</span>
        </div>
        <i class="fas fa-phone-alt" style="color: var(--primary); margin-right: 10px;"></i>
        <i class="fas fa-video" style="color: var(--primary);"></i>
    </div>

    <div class="product-brief">
        <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=100">
        <div style="font-size: 12px;">
            <b style="display:block;">Toyota Corolla 2016</b>
            <span style="color: var(--primary); font-weight: bold;">K 145,000</span>
        </div>
    </div>

    <div class="chat-body">
        <div class="msg msg-them">
            Is this car still available for viewing in Kitwe?
            <span class="time">10:45 AM</span>
        </div>

        <div class="msg msg-me">
            Yes, it is! I am available this afternoon at Kitwe Central.
            <span class="time">10:47 AM</span>
        </div>

        <div class="msg msg-them">
            Great. Can I bring my mechanic to check the engine?
            <span class="time">10:50 AM</span>
        </div>
    </div>

    <div class="input-area">
        <i class="fas fa-plus-circle" style="color: #888;"></i>
        <i class="fas fa-camera" style="color: #888;"></i>
        <div class="input-box">
            <input type="text" placeholder="Type a message...">
        </div>
        <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>

</body>
</html>
