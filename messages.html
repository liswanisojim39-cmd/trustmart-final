<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Trust Mart by Zeta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; }
        .header { background: white; padding: 20px; border-bottom: 1px solid #ddd; display: flex; align-items: center; gap: 15px; }
        .chat-item { background: white; padding: 15px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; text-decoration: none; color: inherit; }
        .chat-img { width: 50px; height: 50px; border-radius: 50%; background: #ddd; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .f-link { text-decoration: none; color: #bdc3c7; font-size: 11px; text-align: center; }
        .f-link.active { color: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color:var(--zeta)"><i class="fas fa-arrow-left"></i></a>
        <h1 style="font-size: 18px; margin: 0;">Messages</h1>
    </div>

    <div class="chat-list">
        <div style="text-align: center; padding: 50px; color: #888;">
            <i class="fas fa-comments" style="font-size: 40px; margin-bottom: 10px;"></i>
            <p>No active conversations yet.</p>
        </div>
    </div>

    <div class="footer">
        <a href="index.html" class="f-link"><i class="fas fa-home"></i>Home</a>
        <a href="messages.html" class="f-link active"><i class="fas fa-comment"></i>Chats</a>
        <a href="profile.html" class="f-link"><i class="fas fa-user"></i>Profile</a>
    </div>
</body>
</html>
