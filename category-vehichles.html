<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicles in Zambia - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; }
        
        /* Header & Search */
        .header { background: white; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 15px; }
        .back-btn { color: var(--zeta); text-decoration: none; font-size: 18px; }
        .search-bar { flex: 1; background: #eee; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
        .search-bar input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; }

        /* Vehicle Specific Filters */
        .vehicle-filters { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
        .filter-pill { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; white-space: nowrap; font-size: 12px; font-weight: 600; background: white; display: flex; align-items: center; gap: 5px; }
        .filter-pill.active { background: var(--zeta); color: white; border-color: var(--zeta); }

        /* List View */
        .results-container { padding: 15px; }
        .vehicle-card { background: white; border-radius: 15px; margin-bottom: 15px; overflow: hidden; display: flex; text-decoration: none; color: inherit; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .v-img { width: 120px; height: 120px; background-size: cover; background-position: center; flex-shrink: 0; }
        .v-info { padding: 12px; flex: 1; min-width: 0; }
        .v-price { color: var(--primary); font-weight: 800; font-size: 16px; margin-bottom: 4px; }
        .v-name { font-size: 14px; font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .v-meta { font-size: 11px; color: #777; margin-top: 8px; display: flex; gap: 10px; }
        .v-meta span { background: #f0f2f5; padding: 2px 6px; border-radius: 4px; }

        .pro-badge { background: #fff8e1; border: 1px solid #fbbf24; color: #b45309; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="search-bar">
            <i class="fas fa-search" style="color: #888;"></i>
            <input type="text" placeholder="Search cars, trucks, bikes...">
        </div>
        <i class="fas fa-sliders-h" style="color: var(--primary);"></i>
    </div>

    <div class="vehicle-filters">
        <div class="filter-pill active"><i class="fas fa-car"></i> All Types</div>
        <div class="filter-pill">Toyota</div>
        <div class="filter-pill">Automatic</div>
        <div class="filter-pill">Below K100k</div>
        <div class="filter-pill">Manual</div>
    </div>

    <div class="results-container">
        <a href="vehicle-details.html" class="vehicle-card">
            <div class="v-img" style="background-image: url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=400');"></div>
            <div class="v-info">
                <div class="pro-badge"><i class="fas fa-crown"></i> ZETA PRO</div>
                <div class="v-price">K 145,000</div>
                <span class="v-name">Toyota Corolla 2016 - Mint Condition</span>
                <div class="v-meta">
                    <span><i class="fas fa-gas-pump"></i> Petrol</span>
                    <span><i class="fas fa-road"></i> 82k km</span>
                </div>
                <div style="font-size: 11px; color: #999; margin-top: 8px;"><i class="fas fa-map-marker-alt"></i> Kitwe Central</div>
            </div>
        </a>

        <a href="#" class="vehicle-card">
            <div class="v-img" style="background-image: url('https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?w=400');"></div>
            <div class="v-info">
                <div class="v-price">K 210,000</div>
                <span class="v-name">Toyota Hilux Single Cab</span>
                <div class="v-meta">
                    <span><i class="fas fa-gas-pump"></i> Diesel</span>
                    <span><i class="fas fa-cog"></i> 4x4</span>
                </div>
                <div style="font-size: 11px; color: #999; margin-top: 8px;"><i class="fas fa-map-marker-alt"></i> Lusaka, Westgate</div>
            </div>
        </a>

        <a href="#" class="vehicle-card">
            <div class="v-img" style="background-image: url('https://images.unsplash.com/photo-1558981403-c5f91ad9316b?w=400');"></div>
            <div class="v-info">
                <div class="v-price">K 45,000</div>
                <span class="v-name">Yamaha Cruising Bike</span>
                <div class="v-meta">
                    <span><i class="fas fa-tachometer-alt"></i> 250cc</span>
                </div>
                <div style="font-size: 11px; color: #999; margin-top: 8px;"><i class="fas fa-map-marker-alt"></i> Ndola</div>
            </div>
        </a>
    </div>

</body>
</html>
