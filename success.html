<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .success-card { background: white; width: 85%; max-width: 350px; padding: 40px 20px; border-radius: 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.1); animation: slideUp 0.6s ease-out; }
        
        .check-circle { width: 80px; height: 80px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; animation: scalePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.4s both; }
        
        h2 { color: var(--zeta); margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        
        .btn { background: var(--primary); color: white; text-decoration: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; display: block; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes scalePop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="check-circle">
            <i class="fas fa-check"></i>
        </div>
        <h2>Action Successful!</h2>
        <p>Your request has been processed securely through the Zeta ecosystem. You can now continue browsing.</p>
        
        <a href="index.html" class="btn">Return Home</a>
    </div>

</body>
</html>
