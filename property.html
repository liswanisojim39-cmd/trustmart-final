<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMart - Property</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .back-btn { text-decoration: none; color: #27ae60; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; }
        .card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-img { height: 150px; background: #ddd url('https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=500') center/cover; }
        .card-body { padding: 15px; }
        .price { color: #27ae60; font-weight: bold; font-size: 20px; margin: 0; }
        .wa-btn { display: block; background: #25d366; color: white; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h2>Available Property</h2>
    
    <div class="card">
        <div class="card-img"></div>
        <div class="card-body">
            <p class="price">K 1,200,000</p>
            <p>3 Bedroom House in Avondale</p>
            <a href="https://wa.me/260979710270?text=I%20am%20interested%20in%20the%20Avondale%20House" class="wa-btn">Enquire on WhatsApp</a>
        </div>
    </div>
</body>
</html>
