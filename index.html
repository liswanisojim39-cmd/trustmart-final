<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMart Zambia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; color: #2c3e50; padding-bottom: 80px; }
        .top-bar { background: #27ae60; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 22px; }
        .container { padding: 15px; }
        
        /* Category Section */
        .section-label { font-size: 14px; font-weight: bold; color: #888; margin: 15px 0 10px 5px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .box { background: white; padding: 15px 5px; border-radius: 12px; text-align: center; text-decoration: none; color: #2c3e50; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .box i { color: #27ae60; font-size: 20px; display: block; margin-bottom: 5px; }
        .box span { font-size: 11px; font-weight: 600; }

        /* Featured Card */
        .card { background: white; border-radius: 15px; overflow: hidden; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: inherit; display: block; }
        .img { height: 180px; background: #ddd url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=600') center/cover; }
        .info { padding: 15px; }
        .price { color: #27ae60; font-size: 20px; font-weight: bold; margin: 0; }

        /* Bottom Nav */
        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .f-link { text-decoration: none; color: #aaa; font-size: 11px; text-align: center; }
        .f-link.active { color: #27ae60; }
        .f-link i { font-size: 20px; display: block; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="top-bar">TrustMart</div>

    <div class="container">
        <div class="section-label">Categories</div>
        <div class="grid">
            <a href="property.html" class="box"><i class="fas fa-home"></i><span>Property</span></a>
            <a href="vehicles.html" class="box"><i class="fas fa-car"></i><span>Vehicles</span></a>
            <a href="electronics.html" class="box"><i class="fas fa-mobile-alt"></i><span>Electronics</span></a>
        </div>

        <div class="section-label">Featured Deal</div>
        <a href="vehicles.html" class="card">
            <div class="img"></div>
            <div class="info">
                <p class="price">K 145,000</p>
                <p style="margin:5px 0; font-weight: bold;">Toyota Corolla 2016</p>
                <p style="color:#888; font-size:12px;">Kitwe, Zambia</p>
            </div>
        </a>
    </div>

    <div class="footer">
        <a href="index.html" class="f-link active"><i class="fas fa-home"></i>Home</a>
        <a href="sell.html" class="f-link"><i class="fas fa-plus-circle"></i>Sell</a>
        <a href="https://wa.me/260979710270" class="f-link"><i class="fas fa-comment"></i>Help</a>
    </div>

</body>
</html>
