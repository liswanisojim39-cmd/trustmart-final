<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMart - Zambia's Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #27ae60;
            --dark: #2c3e50;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding-bottom: 80px; /* Space for Floating Button */
        }

        /* Header & Hero */
        .hero {
            background: linear-gradient(135deg, var(--primary), #2ecc71);
            color: white;
            padding: 40px 20px 60px 20px;
            text-align: center;
            border-radius: 0 0 30px 30px;
        }

        .hero h1 { margin: 0; font-size: 32px; letter-spacing: -1px; }
        .hero p { opacity: 0.9; font-size: 14px; margin-top: 5px; }

        /* User Profile Box */
        .user-status-card {
            margin: -30px 20px 20px 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Categories Grid */
        .section-title {
            padding: 0 20px;
            font-size: 18px;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .cat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px;
        }

        .cat-card {
            background: white;
            padding: 15px 10px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            color: var(--dark);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .cat-card:active { transform: scale(0.9); }
        .cat-card i {
            font-size: 24px;
            color: var(--primary);
            margin-bottom: 8px;
            display: block;
        }
        .cat-card span { font-size: 12px; font-weight: 600; }

        /* Safety Banner */
        .safety-banner {
            margin: 25px 20px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .safety-banner i { color: #856404; font-size: 20px; }
        .safety-banner p { margin: 0; font-size: 12px; color: #856404; line-height: 1.4; }

        /* Buttons */
        .btn-post {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.4);
            text-decoration: none;
            z-index: 1000;
        }

        .login-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .secondary-btn {
            color: #3498db;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

        <h1>Trust<b>Mart</b></h1>
        <p>Your Trusted Zambian Directory & Marketplace</p>
    </div>

    <div id="authSection" class="user-status-card">
        <span style="color:#777; font-size: 14px;">Loading...</span>
    </div>
