<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMart Zambia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: sans-serif; background-color: var(--light); margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }

        /* Simplified Slider */
        .promo-banner {
            background: var(--dark);
            color: white;
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=500');
            background-size: cover;
        }

        .section-title { padding: 10px 20px; font-size: 18px; font-weight: bold; }

        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px; }
        .cat-item { background: white; padding: 15px 5px; border-radius: 12px; text-align: center; text-decoration: none; color: var(--dark); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .cat-item i { font-size: 20px; color: var(--primary); margin-bottom: 8px; display: block; }
        .cat-item span { font-size: 11px; font-weight: 600; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
        .nav-link { text-decoration: none; color: #888; font-size: 11px; }
        .nav-link i { display: block; font-size: 18px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Trust<b>Mart</b></h1>
    </div>

    <div class="promo-banner">
        <h3 style="margin:0;">Featured Property</h3>
        <p style="font-size: 12px; opacity: 0.9;">Best deals in Lusaka this week</p>
        <a href="property.html" style="color: white; font-weight: bold; font-size: 12px;">View Listings →</a>
    </div>

    <h2 class="section-title">Categories</h2>
    <div class="cat-grid">
        <a href="property.html" class="cat-item">
            <i class="fas fa-home"></i>
            <span>Property</span>
        </a>
        <a href="vehicles.html" class="cat-item">
            <i class="fas fa-car"></i>
            <span>Vehicles</span>
        </a>
        <a href="electronics.html" class="cat-item">
            <i class="fas fa-mobile-alt"></i>
            <span>Electronics</span>
        </a>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-link" style="color: var(--primary);"><i class="fas fa-home"></i>Home</a>
        <a href="https://wa.me/260979710270" class="nav-link"><i class="fas fa-plus-circle"></i>Sell</a>
        <a href="https://wa.me/260979710270" class="nav-link"><i class="fas fa-headset"></i>Help</a>
    </div>

</body>
</html>
