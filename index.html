<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMart V3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); margin: 0; padding-bottom: 80px; }
        .update-tag { background: #e74c3c; color: white; text-align: center; font-size: 10px; padding: 5px; font-weight: bold; }
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
        .cat-item { background: white; padding: 20px 10px; border-radius: 15px; text-align: center; text-decoration: none; color: var(--dark); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cat-item i { font-size: 24px; color: var(--primary); margin-bottom: 10px; display: block; }
        .cat-item span { font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="update-tag">V3 - WHATSAPP LINKS REMOVED</div>

    <div class="header">
        <h1>Trust<b>Mart</b></h1>
        <p>Zambian Directory</p>
    </div>

    <div class="cat-grid">
        <a href="property.html" class="cat-item">
            <i class="fas fa-home"></i>
            <span>Property</span>
        </a>
        
        <a href="vehicles.html" class="cat-item">
            <i class="fas fa-car"></i>
            <span>Vehicles</span>
        </a>

        <a href="electronics.html" class="cat-item">
            <i class="fas fa-mobile-alt"></i>
            <span>Electronics</span>
        </a>
    </div>

    <p style="text-align: center; color: #888; font-size: 12px; margin-top: 20px;">
        If this still goes to WhatsApp, your browser is showing you an old version.<br>
        Try opening in an <b>Incognito Tab</b>.
    </p>

</body>
</html>
