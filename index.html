<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Mart by Zeta - Zambia</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding-bottom: 90px; }
        .header { background: var(--primary); padding: 20px; border-radius: 0 0 25px 25px; color: white; position: sticky; top: 0; z-index: 1000; }
        .logo-text { font-weight: 900; font-size: 20px; }
        .logo-sub { font-size: 10px; font-weight: 300; opacity: 0.9; }
        .search-box { background: white; border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; margin-top: 15px; }
        .search-box input { border: none; outline: none; flex: 1; font-size: 14px; margin-left: 10px; color: #333; }
        .filters { display: flex; gap: 10px; padding: 15px; overflow-x: auto; white-space: nowrap; }
        .chip { background: white; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--zeta); border: 1px solid #ddd; text-decoration: none; }
        .items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: inherit; }
        .card img { width: 100%; height: 110px; object-fit: cover; background: #eee; }
        .card-info { padding: 10px; }
        .card-price { color: var(--primary); font-weight: 800; font-size: 14px; }
        .fab-sell { position: fixed; bottom: 85px; right: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; font-size: 24px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .f-link { text-decoration: none; color: #bdc3c7; font-size: 11px; text-align: center; }
        .f-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-text">TRUST MART <span class="logo-sub">by Zeta</span></div>
        <div class="search-box">
            <i class="fas fa-search" style="color:#888;"></i>
            <input type="text" placeholder="Search Lusaka, Kitwe, Ndola...">
        </div>
    </div>

    <div class="filters">
        <a href="index.html" class="chip">All Items</a>
        <a href="category.html?type=vehicles" class="chip">Vehicles</a>
        <a href="category.html?type=property" class="chip">Property</a>
        <a href="category.html?type=electronics" class="chip">Electronics</a>
    </div>

    <div class="items-grid" id="itemsGrid">
        <p style="grid-column: span 2; text-align: center; color: #888; padding: 20px;">Loading live listings...</p>
    </div>

    <a href="post-ad.html" class="fab-sell"><i class="fas fa-plus"></i></a>

    <div class="footer">
        <a href="index.html" class="f-link active"><i class="fas fa-home"></i>Home</a>
        <a href="messages.html" class="f-link"><i class="fas fa-comment"></i>Chats</a>
        <a href="profile.html" class="f-link"><i class="fas fa-user"></i>Profile</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1GK3idp1dzm9ErX0k50dfFnCLjPVapLA",
            authDomain: "trust-mart-73f8a.firebaseapp.com",
            projectId: "trust-mart-73f8a",
            storageBucket: "trust-mart-73f8a.firebasestorage.app",
            messagingSenderId: "715567477271",
            appId: "1:715567477271:web:0550e70b07f7db8e80a252"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("ads").where("status", "==", "approved").orderBy("createdAt", "desc")
            .onSnapshot((querySnapshot) => {
                const grid = document.getElementById('itemsGrid');
                grid.innerHTML = "";
                if(querySnapshot.empty) {
                    grid.innerHTML = '<p style="grid-column: span 2; text-align: center; color: #888; padding: 20px;">No ads live yet. Be the first to post!</p>';
                }
                querySnapshot.forEach((doc) => {
                    const ad = doc.data();
                    grid.innerHTML += `
                        <div class="card">
                            <img src="https://via.placeholder.com/400x250?text=${ad.category}">
                            <div class="card-info">
                                <div class="card-price">K ${ad.price}</div>
                                <span style="font-size: 13px; font-weight: bold;">${ad.title}</span><br>
                                <small style="color: #888;">${ad.location}</small>
                            </div>
                        </div>`;
                });
            });
    </script>
</body>
</html>
