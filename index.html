<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMart - Zambia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light); margin: 0; padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 25px 25px; }
        .section-title { padding: 20px; font-size: 18px; font-weight: bold; color: var(--dark); }
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 20px; }
        .cat-item { background: white; padding: 20px 10px; border-radius: 15px; text-align: center; text-decoration: none; color: var(--dark); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cat-item i { font-size: 24px; color: var(--primary); margin-bottom: 10px; display: block; }
        .cat-item span { font-size: 11px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Trust<b>Mart</b></h1>
        <p>Explore Zambian Listings</p>
    </div>

    <h2 class="section-title">Categories</h2>
    <div class="cat-grid">
        <a href="property.html" class="cat-item">
            <i class="fas fa-home"></i>
            <span>Property</span>
        </a>
        
        <a href="vehicles.html" class="cat-item">
            <i class="fas fa-car"></i>
            <span>Vehicles</span>
        </a>

        <a href="electronics.html" class="cat-item">
            <i class="fas fa-mobile-alt"></i>
            <span>Electronics</span>
        </a>
    </div>

    <div style="margin: 30px 20px; padding: 20px; background: white; border-radius: 15px; text-align: center;">
        <h3 style="margin: 0; color: var(--dark);">Sell Something?</h3>
        <p style="font-size: 13px; color: #666;">Click the button below to message the admin.</p>
        <a href="https://wa.me/260979710270" style="color: var(--primary); font-weight: bold; text-decoration: none;">Contact Admin</a>
    </div>

</body>
</html>
