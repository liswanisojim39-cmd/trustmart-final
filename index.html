<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Trust Mart</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>body { background: #111; color: white; padding: 20px; font-family: sans-serif; }</style>
</head>
<body>
    <h2>Approve New Ads</h2>
    <div id="list"></div>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyA1GK3idp1dzm9ErX0k50dfFnCLjPVapLA", authDomain: "trust-mart-73f8a.firebaseapp.com", projectId: "trust-mart-73f8a", storageBucket: "trust-mart-73f8a.firebasestorage.app", messagingSenderId: "715567477271", appId: "1:715567477271:web:0550e70b07f7db8e80a252" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        db.collection("ads").where("status", "==", "pending").onSnapshot(snap => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            snap.forEach(doc => {
                list.innerHTML += `<div style="background:#222; padding:10px; margin-bottom:10px;">
                    ${doc.data().title} - K${doc.data().price}<br>
                    <button onclick="db.collection('ads').doc('${doc.id}').update({status:'approved'})">Approve</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
