<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustMart - Vehicles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .back-btn { text-decoration: none; color: #27ae60; font-weight: bold; }
        .card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-img { height: 180px; background: #ddd url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=500') center/cover; }
        .card-body { padding: 15px; }
        .price { color: #27ae60; font-weight: bold; font-size: 20px; margin: 0; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Home</a>
    <h2>Vehicle Listings</h2>
    <div class="card">
        <div class="card-img"></div>
        <div class="card-body">
            <p class="price">K 145,000</p>
            <p style="font-weight:bold; margin: 5px 0;">Toyota Corolla (Pristine)</p>
            <p style="color: #666; font-size: 14px;">Kitwe, Zambia</p>
        </div>
    </div>
</body>
</html>
