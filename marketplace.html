<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse - TrustMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .search-wrapper { padding: 10px; background: #fff; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #searchInput { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; box-sizing: border-box; }
        .feed-container { padding: 15px; }
        .listing-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #ddd; }
        .listing-card.verified { border-left-color: #27ae60; }
        .product-img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .chat-btn { background: #25D366; color: white; flex: 1; text-align: center; padding: 12px; border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .map-btn { background: #3498db; color: white; flex: 1; text-align: center; padding: 12px; border-radius: 25px; text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>
    <header style="padding: 15px;">
        <a href="index.html" style="color:white; float:left;"><i class="fa fa-arrow-left"></i></a>
        <div class="logo" style="text-align:center;">Trust<b>Mart</b></div>
    </header>

    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search Lusaka, Hotels, etc...">
    </div>

    <div class="feed-container" id="feed"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const feedDiv = document.getElementById('feed');
        const searchInput = document.getElementById('searchInput');

        function loadData(searchText = "") {
            db.collection("listings").orderBy("timestamp", "desc").onSnapshot((snap) => {
                feedDiv.innerHTML = "";
                snap.forEach((doc) => {
                    const item = doc.data();
                    
                    // Simple search filter
                    if(searchText && !item.title.toLowerCase().includes(searchText.toLowerCase()) && !item.location.toLowerCase().includes(searchText.toLowerCase())) return;

                    // Directions URL logic
                    const fullAddress = `${item.title}, ${item.address || ''}, ${item.location}`;
                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(fullAddress)}`;

                    feedDiv.innerHTML += `
                        <div class="listing-card ${item.verified ? 'verified' : ''}">
                            ${item.imageUrl ? `<img src="${item.imageUrl}" class="product-img">` : ''}
                            <div style="font-size:12px; color:#777;"><i class="fa fa-map-marker-alt"></i> ${item.location}</div>
                            <h3 style="margin:5px 0;">${item.title}</h3>
                            <span style="color:#27ae60; font-weight:bold; font-size:18px;">K${item.price}</span>
                            <p style="color:#666; font-size:13px; margin:5px 0;">${item.description}</p>
                            
                            <div class="btn-group">
                                <a href="https://wa.me/${item.phone}" class="chat-btn" target="_blank"><i class="fab fa-whatsapp"></i> Chat</a>
                                <a href="${mapsUrl}" class="map-btn" target="_blank"><i class="fa fa-directions"></i> Map</a>
                            </div>
                        </div>`;
                });
            });
        }
        searchInput.addEventListener('input', (e) => loadData(e.target.value));
        loadData();
    </script>
</body>
</html>
