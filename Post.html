<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Ad - TrustMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background:#f4f7f6;">
    <header style="padding: 15px; background:#27ae60; color:white;">
        <a href="index.html" style="color:white; float:left; text-decoration:none;"><i class="fa fa-arrow-left"></i> Back</a>
        <div class="logo" style="text-align:center; font-weight:bold;">TrustMart</div>
    </header>

    <div style="padding:20px; max-width:500px; margin:auto; background:white; border-radius:15px; margin-top:20px; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
        <h2 style="margin-top:0;">New Listing</h2>
        
        <label style="font-weight:bold; font-size:14px;">Business/Item Name</label>
        <input type="text" id="title" placeholder="e.g. Blue Valley Lodge" style="width:100%; margin:8px 0 15px 0; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        
        <label style="font-weight:bold; font-size:14px;">Category</label>
        <select id="cat" style="width:100%; margin:8px 0 15px 0; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
            <option>Shop</option><option>Garage</option><option>Hotel</option><option>Car Rental</option><option>Real Estate</option>
        </select>

        <label style="font-weight:bold; font-size:14px;">City</label>
        <select id="location" style="width:100%; margin:8px 0 15px 0; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
            <option>Lusaka</option><option>Kitwe</option><option>Ndola</option><option>Kabwe</option><option>Chingola</option>
            <option>Livingstone</option><option>Kasama</option><option>Chipata</option><option>Other</option>
        </select>

        <label style="font-weight:bold; font-size:14px;">Specific Address / Landmark</label>
        <input type="text" id="address" placeholder="e.g. Opposite Manda Hill, Great East Rd" style="width:100%; margin:8px 0 15px 0; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">

        <label style="font-weight:bold; font-size:14px;">WhatsApp Number</label>
        <input type="tel" id="phone" placeholder="097..." style="width:100%; margin:8px 0 15px 0; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        
        <label style="font-weight:bold; font-size:14px;">Price (ZMW)</label>
        <input type="number" id="price" style="width:100%; margin:8px 0 15px 0; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">

        <label style="font-weight:bold; font-size:14px;">Photo</label>
        <input type="file" id="photoFile" accept="image/*" style="display:block; margin:8px 0 15px 0;">
        
        <textarea id="desc" placeholder="Details..." style="width:100%; height:80px; margin:8px 0 15px 0; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;"></textarea>
        
        <button id="postBtn" style="width:100%; padding:15px; background:#27ae60; color:white; border:none; border-radius:8px; font-weight:bold;">Submit Post</button>
        <p id="uploadStatus" style="text-align:center; font-size:13px; margin-top:10px;"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
