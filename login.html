<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrustMart</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f4f7f6; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; animation: fadeOut 0.5s ease-in-out 3s forwards; }
        .logo { font-size: 60px; font-weight: 900; color: #2c3e50; letter-spacing: 8px; animation: scaleUp 1s ease-out; }
        .sub { font-size: 12px; color: #888; margin-top: 10px; letter-spacing: 3px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeOut { from { opacity: 1; visibility: visible; } to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>
    <div id="splash">
        <div class="logo">ZETA</div>
        <div class="sub">BY TRUSTMART</div>
    </div>
    <div class="card">
        <h2>Login</h2>
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <button class="btn" onclick="location.href='index.html'">Log In</button>
    </div>
</body>
</html>
