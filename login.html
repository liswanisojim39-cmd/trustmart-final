<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; overflow: hidden; }

        /* --- ZETA SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOut 0.5s ease-in-out 2.5s forwards; /* Fades out after 2.5s */
        }

        .zeta-logo {
            font-size: 50px;
            font-weight: 800;
            color: var(--zeta);
            letter-spacing: 5px;
            animation: zoomIn 1.5s ease-out;
        }

        .from-label {
            position: absolute;
            bottom: 50px;
            font-size: 12px;
            color: #888;
            letter-spacing: 2px;
        }

        /* --- LOGIN FORM --- */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 350px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .login-card h2 { color: var(--primary); margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        /* --- ANIMATIONS --- */
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; visibility: visible; }
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="zeta-logo">ZETA</div>
        <div class="from-label">FROM TRUSTMART</div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <form onsubmit="handleLogin(event)">
                <input type="email" placeholder="Email or Phone" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <p style="font-size: 13px; color: #888; margin-top: 20px;">
                Don't have an account? <a href="#" style="color: var(--primary); text-decoration:none;">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        // Redirect to home page after clicking login
        function handleLogin(event) {
            event.preventDefault();
            window.location.href = "index.html";
        }

        // Re-enable scrolling after splash screen disappears
        setTimeout(() => {
            document.body.style.overflow = "auto";
        }, 3000);
    </script>

</body>
</html>
