<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Ad - Trust Mart by Zeta</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .form-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color:var(--zeta)"><i class="fas fa-arrow-left"></i></a>
        <h1 style="font-size: 18px; margin:0;">Post New Ad</h1>
    </div>

    <div class="form-card">
        <form id="adForm">
            <input type="text" id="title" placeholder="Item Name (e.g. Toyota Vitz)" required>
            <select id="category" required>
                <option value="">Select Category</option>
                <option value="vehicles">Vehicles</option>
                <option value="electronics">Electronics</option>
                <option value="property">Property</option>
            </select>
            <input type="number" id="price" placeholder="Price (ZMW)" required>
            <input type="text" id="location" placeholder="Location (e.g. Lusaka)" required>
            <textarea id="desc" rows="4" placeholder="Description"></textarea>
            <button type="submit" class="submit-btn">Post My Ad</button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1GK3idp1dzm9ErX0k50dfFnCLjPVapLA",
            authDomain: "trust-mart-73f8a.firebaseapp.com",
            projectId: "trust-mart-73f8a",
            storageBucket: "trust-mart-73f8a.firebasestorage.app",
            messagingSenderId: "715567477271",
            appId: "1:715567477271:web:0550e70b07f7db8e80a252"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        document.getElementById('adForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if(!user) { alert("Please login in Profile first!"); return; }

            const adData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                location: document.getElementById('location').value,
                description: document.getElementById('desc').value,
                sellerEmail: user.email,
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("ads").add(adData);
            alert("Success! Ad sent for approval.");
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
