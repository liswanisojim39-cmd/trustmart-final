<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: white; margin: 0; padding-bottom: 80px; }
        .header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; background: white; z-index: 10; }
        
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; text-decoration: none; color: inherit; border-bottom: 1px solid #f9f9f9; }
        .chat-item:active { background: #f0f2f5; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 20px; color: white; position: relative; }
        .online-dot { width: 12px; height: 12px; background: #27ae60; border: 2px solid white; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; }
        
        .chat-info { flex: 1; }
        .chat-info b { font-size: 15px; display: block; margin-bottom: 2px; }
        .chat-info p { font-size: 13px; color: #777; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 200px; }
        .chat-time { font-size: 11px; color: #bbb; }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .f-link { text-decoration: none; color: #bdc3c7; font-size: 11px; text-align: center; }
        .f-link.active { color: var(--primary); }
        .f-link i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 22px;">Messages</h1>
        <i class="fas fa-edit" style="color: var(--primary);"></i>
    </div>

    <div class="chat-list">
        <a href="#" class="chat-item">
            <div class="avatar" style="background: #3498db;"><i class="fas fa-user"></i><div class="online-dot"></div></div>
            <div class="chat-info">
                <b>Kondwani Tembo</b>
                <p>Is the Toyota Corolla still available? I want to see it today.</p>
            </div>
            <div class="chat-time">10:45 AM</div>
        </a>

        <a href="#" class="chat-item">
            <div class="avatar" style="background: #e67e22;"><i class="fas fa-user"></i></div>
            <div class="chat-info">
                <b>Sarah Phiri</b>
                <p>I can offer K 12,000 for the apartment. Please consider.</p>
            </div>
            <div class="chat-time">Yesterday</div>
        </a>
    </div>

    <div class="footer">
        <a href="index.html" class="f-link"><i class="fas fa-home"></i>Home</a>
        <a href="messages.html" class="f-link active"><i class="fas fa-comment-dots"></i>Chats</a>
        <a href="sell.html" class="f-link"><i class="fas fa-plus-circle"></i>Sell</a>
        <a href="profile.html" class="f-link"><i class="fas fa-user"></i>Profile</a>
    </div>

</body>
</html>
