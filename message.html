<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox - TrustMart Zeta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: white; margin: 0; padding-bottom: 80px; }
        
        /* Header */
        .header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 100; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; color: var(--zeta); }
        .header i { font-size: 20px; color: var(--primary); background: #e8f5e9; padding: 10px; border-radius: 50%; }

        /* Search Bar */
        .search-area { padding: 10px 20px; }
        .search-inbox { background: #f0f2f5; border-radius: 20px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; }
        .search-inbox input { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; }

        /* Chat List */
        .chat-list { margin-top: 10px; }
        .chat-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; text-decoration: none; color: inherit; border-bottom: 1px solid #f9f9f9; transition: 0.2s; }
        .chat-item:active { background: #f0f2f5; }
        
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; position: relative; flex-shrink: 0; }
        .online-dot { width: 14px; height: 14px; background: #27ae60; border: 3px solid white; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; }
        
        .chat-content { flex: 1; min-width: 0; }
        .chat-content b { font-size: 16px; display: block; color: var(--zeta); margin-bottom: 2px; }
        .chat-content p { font-size: 13px; color: #65676b; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .chat-meta { text-align: right; }
        .chat-time { font-size: 11px; color: #888; }
        .unread-badge { background: var(--primary); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-top: 5px; display: inline-block; font-weight: bold; }

        /* Bottom Nav */
        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        .f-link { text-decoration: none; color: #bdc3c7; font-size: 11px; text-align: center; }
        .f-link.active { color: var(--primary); }
        .f-link i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Chats</h1>
        <i class="fas fa-camera"></i>
    </div>

    <div class="search-area">
        <div class="search-inbox">
            <i class="fas fa-search" style="color: #888;"></i>
            <input type="text" placeholder="Search messages...">
        </div>
    </div>

    <div class="chat-list">
        <a href="chat.html" class="chat-item">
            <div class="avatar" style="background: #3498db;">
                <i class="fas fa-user"></i>
                <div class="online-dot"></div>
            </div>
            <div class="chat-content">
                <b>Kondwani Tembo</b>
                <p>Is the Toyota Corolla still available? I want to see it today.</p>
            </div>
            <div class="chat-meta">
                <div class="chat-time">10:45 AM</div>
                <div class="unread-badge">1</div>
            </div>
        </a>

        <a href="#" class="chat-item">
            <div class="avatar" style="background: #e67e22;">
                <i class="fas fa-user"></i>
            </div>
            <div class="chat-content">
                <b>Sarah Phiri</b>
                <p>Thanks for the discount! I'll pick it up tomorrow.</p>
            </div>
            <div class="chat-meta">
                <div class="chat-time">Yesterday</div>
            </div>
        </a>

        <a href="#" class="chat-item">
            <div class="avatar" style="background: #9b59b6;">
                <i class="fas fa-user"></i>
            </div>
            <div class="chat-content">
                <b>TrustMart Support</b>
                <p>Your listing for "iPhone 14 Pro" has been approved.</p>
            </div>
            <div class="chat-meta">
                <div class="chat-time">Mon</div>
            </div>
        </a>
    </div>

    <div class="footer">
        <a href="index.html" class="f-link"><i class="fas fa-home"></i>Home</a>
        <a href="messages.html" class="f-link active"><i class="fas fa-comment-dots"></i>Chats</a>
        <a href="sell.html" class="f-link"><i class="fas fa-plus-circle"></i>Sell</a>
        <a href="profile.html" class="f-link"><i class="fas fa-user"></i>Profile</a>
    </div>

</body>
</html>
