<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category - Trust Mart by Zeta</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; }
        .header { background: #27ae60; color: white; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-info { padding: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color:white"><i class="fas fa-arrow-left"></i></a>
        <h1 id="title" style="font-size: 18px; margin:0; text-transform: capitalize;">Category</h1>
    </div>
    <div class="grid" id="grid"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA1GK3idp1dzm9ErX0k50dfFnCLjPVapLA",
            authDomain: "trust-mart-73f8a.firebaseapp.com",
            projectId: "trust-mart-73f8a",
            storageBucket: "trust-mart-73f8a.firebasestorage.app",
            messagingSenderId: "715567477271",
            appId: "1:715567477271:web:0550e70b07f7db8e80a252"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const type = new URLSearchParams(window.location.search).get('type');
        document.getElementById('title').innerText = type;

        db.collection("ads").where("category", "==", type).where("status", "==", "approved")
            .onSnapshot(snap => {
                const grid = document.getElementById('grid');
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const ad = doc.data();
                    grid.innerHTML += `<div class="card"><div class="card-info"><strong>K${ad.price}</strong><br><small>${ad.title}</small></div></div>`;
                });
            });
    </script>
</body>
</html>
