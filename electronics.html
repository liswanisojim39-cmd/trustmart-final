<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 20px; }
        .header { background: var(--primary); color: white; padding: 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; }
        
        .e-card { background: white; border-radius: 15px; overflow: hidden; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: inherit; display: flex; align-items: center; }
        .e-img { width: 100px; height: 100px; background: #fff center/contain no-repeat; margin: 10px; border-radius: 10px; }
        .e-info { padding: 10px; flex: 1; }
        .e-price { color: var(--primary); font-weight: 800; font-size: 16px; margin: 0; }
        .e-title { font-size: 14px; font-weight: bold; margin: 5px 0; }
        .e-loc { font-size: 11px; color: #888; }
        .view-link { font-size: 12px; color: var(--primary); font-weight: bold; text-decoration: none; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-arrow-left"></i></a>
        <h1 style="margin:0; font-size: 20px; margin-left:10px;">Electronics</h1>
    </div>
    <div class="container">
        <a href="electronics-details.html" class="e-card">
            <div class="e-img" style="background-image: url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=200');"></div>
            <div class="e-info">
                <p class="e-price">K 14,500</p>
                <p class="e-title">iPhone 14 Pro - 256GB</p>
                <p class="e-loc">Lusaka</p>
                <span class="view-link">View Product →</span>
            </div>
        </a>

        <a href="electronics-details.html" class="e-card">
            <div class="e-img" style="background-image: url('https://images.unsplash.com/photo-1588872657578-7efd1f1555ed?w=200');"></div>
            <div class="e-info">
                <p class="e-price">K 6,500</p>
                <p class="e-title">HP Elitebook Core i5</p>
                <p class="e-loc">Kitwe</p>
                <span class="view-link">View Product →</span>
            </div>
        </a>
    </div>
</body>
</html>
