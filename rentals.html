<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustDrive - Car Rentals</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .vehicle-list { padding: 15px; }
        .car-card {
            background: white;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .car-img {
            height: 180px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .transmission-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        .car-info { padding: 15px; }
        .price-tag { font-size: 18px; font-weight: bold; color: #27ae60; }
        .specs {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .security-note {
            font-size: 11px;
            color: #d35400;
            background: #fff5e6;
            padding: 5px;
            border-radius: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header style="padding: 10px;">
        <a href="index.html" style="color:white; float:left; text-decoration:none;">← Back</a>
        <div class="logo">Trust<b>Drive</b></div>
    </header>

    <div class="vehicle-list">
        <div class="car-card">
            <div class="car-img">
                <i class="fa fa-car fa-3x" style="color:#999;"></i>
                <div class="transmission-badge">Automatic</div>
            </div>
            <div class="car-info">
                <div class="price-tag">K750 / day</div>
                <h3>Toyota Hilux (2020)</h3>
                <p style="color: #777;"><i class="fa fa-shield-check"></i> Fully Insured</p>
                
                <div class="specs">
                    <span><i class="fa fa-users"></i> 5 Seats</span>
                    <span><i class="fa fa-gas-pump"></i> Diesel</span>
                    <span><i class="fa fa-snowflake"></i> A/C</span>
                </div>

                <div class="security-note">
                    <i class="fa fa-info-circle"></i> K2,000 Refundable Security Deposit Required
                </div>

                <button class="btn-primary" style="width: 100%; margin-top: 15px;">Book for Rent</button>
            </div>
        </div>

        <div class="car-card">
            <div class="car-img" style="background:#dcdcdc;">
                <i class="fa fa-car fa-3x" style="color:#999;"></i>
                <div class="transmission-badge">Manual</div>
            </div>
            <div class="car-info">
                <div class="price-tag">K400 / day</div>
                <h3>Toyota Vitz</h3>
                <p style="color: #777;"><i class="fa fa-shield-check"></i> Standard Insurance</p>
                
                <div class="specs">
                    <span><i class="fa fa-users"></i> 4 Seats</span>
                    <span><i class="fa fa-gas-pump"></i> Petrol</span>
                    <span><i class="fa fa-snowflake"></i> A/C</span>
                </div>

                <button class="btn-primary" style="width: 100%; margin-top: 15px;">Book for Rent</button>
            </div>
        </div>
    </div>

</body>
</html>
