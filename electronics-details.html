<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics Details - TrustMart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; padding-bottom: 80px; }
        
        .image-header { width: 100%; height: 300px; background: #fff url('https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800') center/contain no-repeat; position: relative; border-bottom: 1px solid #eee; }
        .back-circle { position: absolute; top: 20px; left: 20px; background: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; color: #333; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10; }
        .tag-overlay { position: absolute; bottom: 20px; left: 20px; background: #e74c3c; color: white; padding: 5px 15px; border-radius: 8px; font-weight: bold; font-size: 14px; }

        .content { padding: 20px; background: white; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; }
        .price { font-size: 28px; font-weight: 800; color: var(--primary); margin: 0; }
        .title { font-size: 20px; font-weight: 700; margin: 10px 0; color: var(--zeta); }
        .condition { display: inline-block; background: #e8f5e9; color: var(--primary); padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; margin-bottom: 15px; }

        .specs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; }
        .spec-item { text-align: center; }
        .spec-item i { display: block; color: var(--primary); font-size: 20px; margin-bottom: 5px; }
        .spec-item span { font-size: 11px; font-weight: 600; color: #555; }

        .description { line-height: 1.6; color: #555; font-size: 15px; }
        .description h3 { color: var(--zeta); font-size: 18px; }

        .action-bar { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 20px; display: flex; gap: 15px; box-sizing: border-box; border-top: 1px solid #eee; z-index: 100; }
        .call-btn { flex: 1; border: 2px solid var(--primary); color: var(--primary); text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; }
        .wa-btn { flex: 2; background: #25d366; color: white; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="image-header">
        <a href="electronics.html" class="back-circle"><i class="fas fa-arrow-left"></i></a>
        <div class="tag-overlay">HOT DEAL</div>
    </div>

    <div class="content">
        <p class="price">K 14,500</p>
        <h1 class="title">iPhone 14 Pro - 256GB Gold</h1>
        <div class="condition">BRAND NEW (SEALED)</div>

        <div class="specs-grid">
            <div class="spec-item"><i class="fas fa-hdd"></i><span>256GB</span></div>
            <div class="spec-item"><i class="fas fa-microchip"></i><span>A16 Bionic</span></div>
            <div class="spec-item"><i class="fas fa-battery-full"></i><span>100% Health</span></div>
        </div>

        <div class="description">
            <h3>Item Description</h3>
            <p>Directly from the UK. Factory unlocked to all networks. Comes with original box and accessories. 1-year warranty included. No swaps.</p>
            <p style="color:#7f8c8d; font-size:13px;"><i class="fas fa-map-marker-alt"></i> Cairo Road, Lusaka</p>
        </div>
    </div>

    <div class="action-bar">
        <a href="tel:+260979710270" class="call-btn">Call</a>
        <a href="https://wa.me/260979710270?text=I%20want%20to%20buy%20the%20iPhone%2014" class="wa-btn">
            <i class="fab fa-whatsapp"></i> Chat on WhatsApp
        </a>
    </div>

</body>
</html>
