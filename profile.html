<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Zeta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #27ae60; --zeta: #2c3e50; --fb-blue: #1877f2; --gold: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 100px; }
        
        .cover { width: 100%; height: 160px; background: #2c3e50; position: relative; }
        .profile-header { background: white; padding: 0 20px 20px; border-bottom: 1px solid #ddd; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; background: #999; margin-top: -50px; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .action-grid { display: flex; gap: 10px; margin: 20px 0; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; text-decoration: none; font-size: 13px; }
        .btn-blue { background: var(--fb-blue); color: white; }
        .btn-auth { background: #fff; border: 1px solid #ddd; color: #555; cursor: pointer; }

        .menu-list { background: white; margin-top: 15px; }
        .menu-item { display: flex; align-items: center; padding: 15px 20px; text-decoration: none; color: #333; border-bottom: 1px solid #eee; }
        .menu-item i { width: 30px; color: #65676b; }

        /* ADMIN BUTTON - HIDDEN BY DEFAULT */
        #adminSection { display: none; padding: 20px; background: #fff; margin-top: 15px; text-align: center; border: 2px dashed var(--fb-blue); }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .f-link { text-decoration: none; color: #bdc3c7; font-size: 11px; text-align: center; }
        .f-link.active { color: var(--primary); }
    </style>
</head>
<body>

    <div class="cover"></div>
    <div class="profile-header">
        <div class="avatar" id="userPhoto"><i class="fas fa-user"></i></div>
        <h2 id="userName" style="margin: 10px 0 5px;">Guest User</h2>
        <p id="userEmail" style="color: #666; font-size: 13px; margin: 0;">Sign in to sync your data</p>

        <div class="action-grid">
            <button class="btn btn-auth" id="loginBtn" onclick="googleLogin()">
                <i class="fab fa-google"></i> Google Login
            </button>
            <button class="btn btn-auth" id="logoutBtn" onclick="googleLogout()" style="display:none;">Logout</button>
        </div>
    </div>

    <div id="adminSection">
        <b style="color: var(--fb-blue); display: block; margin-bottom: 10px;">Owner Detected</b>
        <a href="admin.html" class="btn btn-blue" style="display: inline-block; width: 80%;">Open Admin Panel</a>
    </div>

    <div class="menu-list">
        <a href="#" class="menu-item"><i class="fas fa-box"></i> My Listings</a>
        <a href="#" class="menu-item"><i class="fas fa-heart"></i> Watchlist</a>
        <a href="#" class="menu-item"><i class="fas fa-shield-alt"></i> Safety Center</a>
    </div>

    <div class="footer">
        <a href="index.html" class="f-link"><i class="fas fa-home"></i>Home</a>
        <a href="messages.html" class="f-link"><i class="fas fa-comment"></i>Chats</a>
        <a href="profile.html" class="f-link active"><i class="fas fa-user"></i>Profile</a>
    </div>

    <script>
        // REPLACE THIS WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // CHANGE THIS TO YOUR ACTUAL GOOGLE EMAIL
        const OWNER_EMAIL = "your-email@gmail.com";

        function googleLogin() {
            auth.signInWithPopup(provider).then((result) => {
                updateUI(result.user);
            }).catch((error) => {
                console.error("Login Failed", error);
            });
        }

        function googleLogout() {
            auth.signOut().then(() => {
                location.reload();
            });
        }

        function updateUI(user) {
            if (user) {
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                
                // Set Profile Photo
                if(user.photoURL) {
                    document.getElementById('userPhoto').innerHTML = `<img src="${user.photoURL}" style="width:100%; border-radius:50%">`;
                }

                // THE SECURITY CHECK
                if (user.email === OWNER_EMAIL) {
                    document.getElementById('adminSection').style.display = 'block';
                    localStorage.setItem('zeta_admin', 'true'); // Pass for admin.html
                }
            }
        }

        // Check if user is already logged in on page load
        auth.onAuthStateChanged(updateUI);
    </script>
</body>
</html>
