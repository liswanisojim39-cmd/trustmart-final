<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - TrustMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .user-header { background: #2c3e50; color: white; padding: 30px 20px; text-align: center; }
        .my-listing-card { background: white; margin: 15px; padding: 15px; border-radius: 12px; display: flex; gap: 15px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
        .status-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .pending { background: #fff3cd; color: #856404; }
        .live { background: #d4edda; color: #155724; }
        .delete-btn { color: #e74c3c; background: none; border: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body style="background:#f9f9f9;">

    <div class="user-header">
        <a href="index.html" style="color:white; float:left; text-decoration:none;"><i class="fa fa-arrow-left"></i></a>
        <h2 id="userEmail" style="margin:0; font-size:18px;">My Listings</h2>
        <button onclick="logout()" style="margin-top:10px; background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 15px; border-radius:15px;">Logout</button>
    </div>

    <div id="myListingsContainer">
        <p style="text-align:center; padding:50px; color:#888;">Loading your items...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>

    <script>
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                loadMyListings(user.uid);
            } else {
                window.location.href = "login.html";
            }
        });

        function loadMyListings(uid) {
            const container = document.getElementById('myListingsContainer');
            
            db.collection("listings")
              .where("ownerId", "==", uid)
              .onSnapshot((snapshot) => {
                container.innerHTML = "";
                
                if (snapshot.empty) {
                    container.innerHTML = "<p style='text-align:center; padding:50px;'>You haven't posted anything yet.</p>";
                    return;
                }

                snapshot.forEach((doc) => {
                    const item = doc.data();
                    const statusClass = item.verified ? "live" : "pending";
                    const statusText = item.verified ? "Live" : "Pending Review";
                    
                    container.innerHTML += `
                        <div class="my-listing-card">
                            <img src="${item.imageUrl || 'https://via.placeholder.com/80'}" class="thumb">
                            <div style="flex:1;">
                                <h4 style="margin:0;">${item.title}</h4>
                                <p style="margin:5px 0; font-weight:bold; color:#27ae60;">K${item.price}</p>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                            <button class="delete-btn" onclick="deleteItem('${doc.id}')">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    `;
                });
            });
        }

        async function deleteItem(id) {
            if (confirm("Have you sold this item? This will remove the listing permanently.")) {
                try {
                    await db.collection("listings").doc(id).delete();
                    alert("Listing removed.");
                } catch (error) {
                    alert("Error deleting: " + error.message);
                }
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = "login.html";
            });
        }
    </script>
</body>
</html>
